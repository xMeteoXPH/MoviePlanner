<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entry – Movie Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="nav-root"></div>

<div class="container">
  <div style="margin-bottom:20px">
    <a href="index.html" class="btn btn-secondary btn-sm">← Back</a>
  </div>
  <div id="content"></div>
</div>

<!-- Mark Watching Modal -->
<div id="modal-watching" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">Mark as Watching</div>
    <div class="form-group">
      <label>Who's watching?</label>
      <select id="m-watching-who"></select>
    </div>
    <div class="form-group">
      <label>Date Started</label>
      <input type="date" id="m-watching-start">
    </div>
    <div class="form-group">
      <label>Date Finished <span style="color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">(optional — fill when done)</span></label>
      <input type="date" id="m-watching-end">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-watching')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmWatching()">Save</button>
    </div>
  </div>
</div>

<!-- Mark Watched Modal -->
<div id="modal-watched" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">Mark as Watched</div>
    <div class="form-group">
      <label>Who watched it?</label>
      <select id="m-who"></select>
    </div>
    <!-- Movie -->
    <div id="m-date-movie" class="form-group">
      <label>Date Watched</label>
      <input type="date" id="m-date">
    </div>
    <!-- Series -->
    <div id="m-date-series" class="hidden">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label>Date Started</label>
          <input type="date" id="m-date-start">
        </div>
        <div class="form-group">
          <label>Date Finished</label>
          <input type="date" id="m-date-end">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-watched')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmWatched()">Confirm</button>
    </div>
  </div>
</div>

<!-- Rate Modal -->
<div id="modal-rate" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">Your Rating</div>
    <div style="text-align:center;padding:16px 0">
      <div id="modal-stars" class="stars" style="font-size:36px;gap:6px"></div>
      <div id="modal-star-label" style="color:var(--text-muted);font-size:13px;margin-top:8px"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-rate')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmRate()">Save Rating</button>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div id="modal-review" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">Your Review</div>
    <div class="form-group">
      <label>Write your thoughts</label>
      <textarea id="m-review" rows="5" placeholder="What did you think?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-review')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmReview()">Save Review</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="modal-delete" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">Delete Entry</div>
    <p style="color:var(--text-muted);font-size:14px">Are you sure you want to delete this entry? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-delete')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) location.href = 'index.html';

  let pendingRating = 0;

  function getEntryOrRedirect() {
    const e = getEntry(id);
    if (!e) { location.href = 'index.html'; return null; }
    return e;
  }

  function renderPage() {
    const e = getEntryOrRedirect();
    if (!e) return;
    const s = getState();
    const cu = s.currentUser;
    const names = s.names;

    const poster = e.poster
      ? `<img src="${e.poster}" class="detail-poster" alt="${e.title}">`
      : `<div class="detail-poster-placeholder">🎬</div>`;

    const genreTags = (e.genres || []).map(g => `<span class="genre-tag">${g}</span>`).join('');

    let watchInfo = '';
    if (e.status === 'watched' || e.status === 'watching') {
      const fmt = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'}) : null;
      const byStr = e.watchedBy ? `by <strong>${whoLabel(e.watchedBy)}</strong>` : '';
      let dateStr = '';
      if (e.type === 'series') {
        const start = fmt(e.watchedDateStart), end = fmt(e.watchedDate);
        if (start && end) dateStr = `· Started <strong>${start}</strong> → Finished <strong>${end}</strong>`;
        else if (start)   dateStr = `· Started <strong>${start}</strong>`;
        else if (end)     dateStr = `· Finished <strong>${end}</strong>`;
      } else {
        if (fmt(e.watchedDate)) dateStr = `· Watched on <strong>${fmt(e.watchedDate)}</strong>`;
      }
      if (byStr || dateStr) watchInfo = `<div class="watch-info-box">📅 ${byStr} ${dateStr}</div>`;
    }

    const starLabels = ['','Terrible','Poor','Okay','Good','Great'];
    let ratingsHTML = `<div class="section-title">Ratings</div><div class="rating-cards">`;
    USERS.forEach(u => {
      const r = e.ratings && e.ratings[u];
      const canRate = u === cu && e.status === 'watched';
      let starsEl = '';
      if (canRate) {
        starsEl = `<div class="inline-stars" id="stars-${u}">`;
        for (let i = 1; i <= 5; i++) {
          starsEl += `<span class="star ratingstar ${r >= i ? 'filled' : ''}" onclick="quickRate(${i})" onmouseover="hoverStars('stars-${u}',${i})" onmouseout="resetStars('stars-${u}',${r||0})">${r >= i ? '★' : '☆'}</span>`;
        }
        starsEl += `</div><div class="rating-sublabel">${r ? starLabels[r] + ' · click to change' : 'click stars to rate'}</div>`;
      } else if (r) {
        starsEl = `<div class="inline-stars">${Array.from({length:5},(_,i)=>`<span class="star ratingstar ${r>=i+1?'filled':''}">${r>=i+1?'★':'☆'}</span>`).join('')}</div><div class="rating-sublabel">${starLabels[r]}</div>`;
      } else {
        starsEl = `<div class="rating-empty">Not rated yet</div>`;
      }
      ratingsHTML += `<div class="rating-card ${u===cu?'rating-card-mine':''}">
        <div class="rating-card-name">${names[u]}${u===cu?' <span class="you-tag">you</span>':''}</div>
        ${starsEl}</div>`;
    });
    ratingsHTML += `</div>`;

    let reviewsHTML = '';
    if (e.reviews && (e.reviews.me || e.reviews.her)) {
      reviewsHTML = `<div class="section-title">Reviews</div><div class="reviews-row">`;
      USERS.forEach(u => {
        if (e.reviews[u]) reviewsHTML += `<div class="review-block"><div class="reviewer">${names[u]}</div><p>${e.reviews[u].replace(/\n/g,'<br>')}</p></div>`;
      });
      reviewsHTML += `</div>`;
    }

    let controls = `<div class="section-title">Actions</div><div class="actions-row">`;
    if (e.status !== 'watching') controls += `<button class="btn btn-secondary btn-sm" onclick="openWatchingModal()">Mark as Watching</button>`;
    if (e.status !== 'watched')  controls += `<button class="btn btn-secondary btn-sm" onclick="openWatchedModal()">Mark as Watched</button>`;
    if (e.status !== 'towatch')  controls += `<button class="btn btn-secondary btn-sm" onclick="setEntryStatus('towatch')">Move to To Watch</button>`;
    if (e.status === 'watched')  controls += `<button class="btn btn-secondary btn-sm" onclick="openReviewModal()">${e.reviews&&e.reviews[cu]?'Edit My Review':'Write Review'}</button>`;
    controls += `<a href="add.html?edit=${e.id}" class="btn btn-secondary btn-sm">Edit Entry</a>`;
    controls += `<button class="btn btn-danger btn-sm" onclick="openDeleteModal()">Delete</button>`;
    controls += `</div>`;

    document.getElementById('content').innerHTML = `
      <div class="detail-layout">
        <div>${poster}</div>
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <span class="status-badge ${statusBadgeClass(e.status)}">${statusLabel(e.status)}</span>
            <span style="font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">${e.type==='series'?'Series':'Movie'}</span>
          </div>
          <div class="detail-title">${e.title}</div>
          <div class="detail-meta">${[e.year,e.director].filter(Boolean).join(' · ')}</div>
          ${e.description?`<div class="detail-desc">${e.description}</div>`:''}
          <div style="margin-bottom:16px">${genreTags}</div>
          ${watchInfo}${ratingsHTML}${reviewsHTML}${controls}
        </div>
      </div>`;
  }

  function setEntryStatus(status) { updateEntry(id,{status}).then(renderPage); }

  function populateWhoSelect(selectId, val) {
    const n = getNames();
    const sel = document.getElementById(selectId);
    sel.innerHTML = `<option value="together">Together</option><option value="me">Just ${n.me}</option><option value="her">Just ${n.her}</option>`;
    if (val) sel.value = val;
  }

  function openWatchingModal() {
    const e = getEntry(id), today = new Date().toISOString().split('T')[0];
    populateWhoSelect('m-watching-who', e.watchedBy||'together');
    document.getElementById('m-watching-start').value = e.watchedDateStart||today;
    document.getElementById('m-watching-end').value = e.watchedDate||'';
    document.getElementById('modal-watching').classList.remove('hidden');
  }

  function confirmWatching() {
    const endVal = document.getElementById('m-watching-end').value;
    updateEntry(id,{status:'watching',watchedBy:document.getElementById('m-watching-who').value,watchedDateStart:document.getElementById('m-watching-start').value,watchedDate:endVal||null})
      .then(()=>{closeModal('modal-watching');renderPage();});
  }

  function openWatchedModal() {
    const e = getEntry(id), today = new Date().toISOString().split('T')[0];
    const isSeries = e&&e.type==='series';
    populateWhoSelect('m-who', e.watchedBy||'together');
    document.getElementById('m-date-movie').classList.toggle('hidden',isSeries);
    document.getElementById('m-date-series').classList.toggle('hidden',!isSeries);
    if (isSeries) { document.getElementById('m-date-start').value=e.watchedDateStart||today; document.getElementById('m-date-end').value=e.watchedDate||today; }
    else document.getElementById('m-date').value=e.watchedDate||today;
    document.getElementById('modal-watched').classList.remove('hidden');
  }

  function confirmWatched() {
    const e = getEntry(id), isSeries = e&&e.type==='series';
    updateEntry(id,{status:'watched',watchedBy:document.getElementById('m-who').value,watchedDate:isSeries?document.getElementById('m-date-end').value:document.getElementById('m-date').value,watchedDateStart:isSeries?document.getElementById('m-date-start').value:null})
      .then(()=>{closeModal('modal-watched');renderPage();});
  }

  function openReviewModal() {
    const e = getEntry(id);
    document.getElementById('m-review').value=(e.reviews&&e.reviews[getCurrentUser()])||'';
    document.getElementById('modal-review').classList.remove('hidden');
  }

  function confirmReview() {
    const e = getEntry(id), reviews={...(e.reviews||{})};
    reviews[getCurrentUser()] = document.getElementById('m-review').value.trim();
    updateEntry(id,{reviews}).then(()=>{closeModal('modal-review');renderPage();});
  }

  function openDeleteModal() { document.getElementById('modal-delete').classList.remove('hidden'); }
  function confirmDelete() { deleteEntry(id).then(()=>location.href='index.html'); }
  function closeModal(mid) { document.getElementById(mid).classList.add('hidden'); }

  function quickRate(val) {
    const e=getEntry(id), ratings={...(e.ratings||{})};
    ratings[getCurrentUser()]=val;
    updateEntry(id,{ratings}).then(renderPage);
  }

  function hoverStars(cid,val) {
    document.getElementById(cid).querySelectorAll('.star').forEach((s,i)=>{s.textContent=i<val?'★':'☆';s.classList.toggle('filled',i<val);});
  }
  function resetStars(cid,val) {
    document.getElementById(cid).querySelectorAll('.star').forEach((s,i)=>{s.textContent=i<val?'★':'☆';s.classList.toggle('filled',i<val);});
  }

  document.querySelectorAll('.modal-overlay').forEach(el=>{
    el.addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
  });

  showLoading();
  initState().then(()=>{
    hideLoading();
    document.getElementById('nav-root').innerHTML = navHTML();
    renderPage();
  });
</script>
</body>
</html>
